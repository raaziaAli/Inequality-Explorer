<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Dashboard — Inequality Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F1EFE8;min-height:100vh;}
.header{background:#3C3489;color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header h1{font-size:24px;font-weight:700;}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sync-btn{background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.4);padding:8px 18px;font-size:15px;font-weight:700;border-radius:8px;cursor:pointer;font-family:Arial;}
.sync-btn:hover{background:rgba(255,255,255,0.35);}
.period-select{padding:9px 14px;font-size:16px;border-radius:8px;border:none;font-weight:700;color:#3C3489;cursor:pointer;}
.stats-row{display:flex;gap:12px;padding:18px 20px;flex-wrap:wrap;background:white;border-bottom:2px solid #D3D1C7;}
.stat-card{background:#F1EFE8;border-radius:12px;padding:14px 22px;flex:1;min-width:110px;text-align:center;border:2px solid #D3D1C7;}
.stat-num{font-size:34px;font-weight:700;color:#3C3489;}
.stat-label{font-size:15px;color:#5F5E5A;font-weight:700;margin-top:4px;}
.filter-bar{padding:12px 20px;background:#EEEDFE;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.filter-bar label{font-size:16px;font-weight:700;color:#3C3489;}
.filter-select{padding:8px 14px;font-size:16px;border-radius:8px;border:2px solid #AFA9EC;font-family:Arial;color:#3C3489;}
.search-input{padding:8px 14px;font-size:16px;border-radius:8px;border:2px solid #AFA9EC;font-family:Arial;color:#3C3489;min-width:200px;}
.main{padding:18px 20px;max-width:1000px;margin:0 auto;}
.student-card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;border:2px solid #D3D1C7;}
.student-card.high{border-color:#97C459;}
.student-card.mid{border-color:#FAC775;}
.student-card.low{border-color:#F09595;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.avatar{width:44px;height:44px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#534AB7;flex-shrink:0;}
.student-info{flex:1;margin-left:12px;}
.student-name{font-size:20px;font-weight:700;color:#3C3489;}
.student-meta{font-size:14px;color:#5F5E5A;font-weight:600;margin-top:2px;}
.score-badge{padding:6px 16px;border-radius:20px;font-size:16px;font-weight:700;}
.badge-high{background:#EAF3DE;color:#27500A;}
.badge-mid{background:#FAEEDA;color:#412402;}
.badge-low{background:#FCEBEB;color:#791F1F;}
.lesson-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700;}
.pill-done{background:#EAF3DE;color:#27500A;}
.pill-prog{background:#FAEEDA;color:#412402;}
.pill-lock{background:#F1EFE8;color:#888780;}
.msg-section{border-top:2px solid #EEEDFE;padding-top:12px;}
.msg-label{font-size:15px;font-weight:700;color:#3C3489;margin-bottom:6px;}
.prev-msgs{margin-bottom:8px;}
.prev-msg{background:#EEEDFE;border-left:4px solid #7F77DD;border-radius:6px;padding:8px 12px;font-size:14px;color:#3C3489;font-weight:600;margin-bottom:6px;}
.msg-row{display:flex;gap:8px;align-items:stretch;}
.msg-input{flex:1;padding:10px 14px;font-size:16px;border:2px solid #AFA9EC;border-radius:8px;font-family:Arial;color:#3C3489;outline:none;}
.msg-input:focus{border-color:#7F77DD;}
.send-btn{background:#7F77DD;color:white;border:none;padding:10px 20px;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;font-family:Arial;white-space:nowrap;}
.send-btn:hover{background:#534AB7;}
.sent-ok{color:#1D9E75;font-size:14px;font-weight:700;margin-top:6px;display:none;}
.no-students{text-align:center;color:#888780;font-size:20px;font-weight:700;padding:3rem;background:white;border-radius:14px;border:2px dashed #D3D1C7;}
.last-active{font-size:13px;color:#888780;font-weight:600;}
.refresh-note{font-size:14px;color:#888780;padding:10px 20px;text-align:center;}
</style>
</head>
<body>
<div class="header">
  <h1>🏫 Teacher Dashboard — Inequality Explorer</h1>
  <div class="header-right">
    <select class="period-select" id="sync-period">
      <option value="">-- Select Period to Sync --</option>
      <?var c=JSON.parse(coursesJson);for(var i=0;i<c.length;i++){?><option value="<?=c[i].period?>"><?=c[i].period?></option><?}?>
    </select>
    <button class="sync-btn" onclick="syncRoster()">🔄 Sync Roster</button>
    <button class="sync-btn" onclick="refreshData()">↻ Refresh Data</button>
  </div>
</div>

<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Students</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-done" style="color:#1D9E75">—</div><div class="stat-label">All Done</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-prog" style="color:#EF9F27">—</div><div class="stat-label">In Progress</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-low" style="color:#E24B4A">—</div><div class="stat-label">Need Help</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-avg" style="color:#534AB7">—</div><div class="stat-label">Class Avg %</div></div>
</div>

<div class="filter-bar">
  <label>Filter:</label>
  <select class="filter-select" id="period-filter" onchange="applyFilters()">
    <option value="">All Periods</option>
    <?var c2=JSON.parse(coursesJson);for(var i=0;i<c2.length;i++){?><option value="<?=c2[i].period?>"><?=c2[i].period?></option><?}?>
  </select>
  <select class="filter-select" id="status-filter" onchange="applyFilters()">
    <option value="">All Students</option>
    <option value="low">Needs Help (&lt;50%)</option>
    <option value="mid">In Progress (50–69%)</option>
    <option value="high">Doing Well (70%+)</option>
    <option value="all5">Completed All Lessons</option>
  </select>
  <input class="search-input" id="search" placeholder="🔍 Search by name..." oninput="applyFilters()">
</div>

<div class="main" id="main-content">
  <div class="no-students">Loading student data... ⏳</div>
</div>
<div class="refresh-note">Data refreshes when students complete lessons. Use ↻ Refresh to get latest.</div>

<script>
var LESSONS_META = [
  "What Is an Inequality?","Writing Inequalities","Number Lines","Solving Inequalities","Real-World Problems"
];
var allStudents = [];

function loadData() {
  google.script.run
    .withSuccessHandler(function(data) {
      allStudents = data || [];
      updateStats();
      applyFilters();
    })
    .withFailureHandler(function(err) {
      document.getElementById("main-content").innerHTML = '<div class="no-students">⚠️ Error loading data: ' + err + '</div>';
    })
    .getAllStudentData();
}

function updateStats() {
  var total = allStudents.length;
  var done = allStudents.filter(function(s){ return s.lessons.every(function(l){return l&&l.complete;}); }).length;
  var prog = allStudents.filter(function(s){ var c=s.lessons.filter(function(l){return l&&l.complete;}).length; return c>0&&c<5; }).length;
  var low = allStudents.filter(function(s){ return parseInt(s.pct||0)<50; }).length;
  var avg = total ? Math.round(allStudents.reduce(function(a,s){ return a+parseInt(s.pct||0); },0)/total) : 0;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-done").textContent = done;
  document.getElementById("stat-prog").textContent = prog;
  document.getElementById("stat-low").textContent = low;
  document.getElementById("stat-avg").textContent = avg + "%";
}

function applyFilters() {
  var period = document.getElementById("period-filter").value;
  var status = document.getElementById("status-filter").value;
  var search = document.getElementById("search").value.toLowerCase();
  var filtered = allStudents.filter(function(s) {
    if (period && s.period !== period) return false;
    if (search && s.name.toLowerCase().indexOf(search) === -1) return false;
    var pct = parseInt(s.pct||0);
    if (status === "low" && pct >= 50) return false;
    if (status === "mid" && (pct < 50 || pct >= 70)) return false;
    if (status === "high" && pct < 70) return false;
    if (status === "all5" && !s.lessons.every(function(l){return l&&l.complete;})) return false;
    return true;
  });
  renderStudents(filtered);
}

function renderStudents(list) {
  var main = document.getElementById("main-content");
  if (!list.length) {
    main.innerHTML = '<div class="no-students">No students match your filters. 🔍<br><br>New students appear here after they complete their first lesson.</div>';
    return;
  }
  // Sort: low % first so struggling students are at top
  list.sort(function(a,b){ return parseInt(a.pct||0)-parseInt(b.pct||0); });
  var html = "";
  list.forEach(function(s) {
    var pct = parseInt(s.pct || 0);
    var tier = pct >= 70 ? "high" : pct >= 50 ? "mid" : "low";
    var badgeCls = "score-badge badge-"+tier;
    var initials = s.name.split(" ").map(function(n){return n[0];}).join("").substring(0,2).toUpperCase();
    var safeEmail = s.email.replace(/'/g,"\\'");
    html += '<div class="student-card '+tier+'">';
    html += '<div class="card-header">';
    html += '<div style="display:flex;align-items:center">';
    html += '<div class="avatar">'+initials+'</div>';
    html += '<div class="student-info"><div class="student-name">'+s.name+'</div>';
    html += '<div class="student-meta">'+s.period+' &nbsp;·&nbsp; Last active: '+(s.lastActive||'Not yet')+'</div></div></div>';
    html += '<div class="'+badgeCls+'">'+pct+'% &nbsp;·&nbsp; '+s.lessons.filter(function(l){return l&&l.complete;}).length+'/5 lessons</div>';
    html += '</div>';
    html += '<div class="lesson-pills">';
    LESSONS_META.forEach(function(title, i) {
      var L = s.lessons[i];
      if (!L) { html += '<span class="pill pill-lock">🔒 '+title+'</span>'; }
      else if (L.complete) { html += '<span class="pill pill-done">✅ '+title+' ('+L.score+'/'+L.total+')</span>'; }
      else { html += '<span class="pill pill-prog">📖 '+title+'</span>'; }
    });
    html += '</div>';
    html += '<div class="msg-section">';
    if (s.messages && s.messages.length) {
      html += '<div class="prev-msgs">';
      s.messages.slice(-3).forEach(function(m){ html += '<div class="prev-msg">💬 '+m+'</div>'; });
      html += '</div>';
    }
    html += '<div class="msg-label">Send message to '+s.name+':</div>';
    html += '<div class="msg-row">';
    html += '<input class="msg-input" id="msg-'+safeEmail+'" placeholder="Type a hint, encouragement, or correction...">';
    html += '<button class="send-btn" onclick="sendMsg(\''+safeEmail+'\')">📤 Send</button>';
    html += '</div>';
    html += '<div class="sent-ok" id="sent-'+safeEmail+'">✅ Message sent! Student will see it on their next question.</div>';
    html += '</div></div>';
  });
  main.innerHTML = html;
}

function sendMsg(email) {
  var input = document.getElementById("msg-"+email);
  var msg = input.value.trim();
  if (!msg) { alert("Please type a message first!"); return; }
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        input.value = "";
        var ok = document.getElementById("sent-"+email);
        ok.style.display = "block";
        setTimeout(function(){ ok.style.display="none"; }, 3000);
      } else { alert("Could not send: " + (r.error||"unknown error")); }
    })
    .sendTeacherMessage(email, msg);
}

function syncRoster() {
  var period = document.getElementById("sync-period").value;
  if (!period) { alert("Please select a period to sync first."); return; }
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { alert("✅ Synced " + r.count + " students from " + period + "!"); }
      else { alert("⚠️ Sync failed: " + (r.error||"Check Course IDs in Code.gs")); }
    })
    .syncRoster(period);
}

function refreshData() { loadData(); }

loadData();
setInterval(loadData, 60000); // Auto-refresh every 60 seconds
</script>
</body>
</html>
